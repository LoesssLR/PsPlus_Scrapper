name: PSN Plus Tracker

on:
  schedule:
    # Corre automáticamente todos los días a las 14:00 UTC (8:00 AM hora de Costa Rica)
    - cron: '0 14 * * *'
  workflow_dispatch: # Activa un botón en GitHub para poder correrlo manualmente cuando quieras

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Chromium y dependencias del sistema
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Ejecutar Rastreador de Ofertas
      env:
        # Enlazamos los Secrets de GitHub con las variables que espera tu config.py
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        PS_PLUS_URL: ${{ secrets.PS_PLUS_URL }}
      run: python -m src.main